{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 70vh;">
  <div class="card auth-card shadow p-0" style="width: 380px; overflow: hidden;">
    <div class="auth-header text-center py-4">
      <div class="auth-emoji">🥗</div>
      <h3 class="mb-0">Welcome Back</h3>
      <div class="small text-muted">Login to your Food Tracker</div>
    </div>
    <div class="p-4">
      {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
      {% endif %}
      <form method="POST" action="{{ url_for('login') }}">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-aesthetic btn-aesthetic--primary w-100">Login</button>
      </form>

      <p class="text-center mt-3">Don’t have an account?
        <a href="{{ url_for('register') }}">Register</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
